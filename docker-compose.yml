services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    volumes:
      - ./certs/out:/certs:ro
      - ./vault:/vault-setup:ro
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 2s
      timeout: 5s
      retries: 10

  vault-setup:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: root
    volumes:
      - ./certs/out:/certs:ro
      - ./vault:/vault-setup:ro
    entrypoint: /bin/sh
    command: /vault-setup/setup.sh
    restart: "no"

  proxy:
    build: .
    depends_on:
      vault-setup:
        condition: service_completed_successfully
    ports:
      - "5555:5555"
    volumes:
      - ./certs/out:/certs:ro
    environment:
      LISTEN_ADDR: ":5555"
      TLS_CERT: /certs/proxy-server.crt
      TLS_KEY: /certs/proxy-server.key
      TLS_CA: /certs/ca.crt
      PG_ADDR: postgres:5432
      VAULT_ADDR: http://vault:8200
      VAULT_DB_ROLE: readonly
